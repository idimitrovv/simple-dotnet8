name: Create release tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (SemVer, e.g. 1.2.3)"
        required: true

permissions:
  contents: write

jobs:
  create-release-tag:
    name: Create release tag
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Validate version input
        run: |
          $releaseVersion = "${{ github.event.inputs.version }}"

          # Strict MAJOR.MINOR.PATCH only
          $semverPattern = '^[0-9]+\.[0-9]+\.[0-9]+$'

          if ($releaseVersion -notmatch $semverPattern) {
              Write-Error "Invalid version format: $releaseVersion"
              Write-Error "Expected format: MAJOR.MINOR.PATCH (e.g. 1.0.6)"
              exit 1
          }

          echo "VERSION=$releaseVersion" >> $env:GITHUB_ENV

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create tag
        run: |
          $TAG = "${{ env.VERSION }}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a $TAG -m "version $TAG"
          git push origin $TAG
          
  build-and-publish:
    name: Build and Publish
    needs: [create-release-tag]
    uses: ./.github/workflows/build-and-publish.yml
    with:
      version: 1.5.3
    secrets: inherit